<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Перевірка хостингу</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
        }

        header {
            background: #1e293b;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        nav {
            background: #334155;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
        }

        nav a:hover {
            color: #38bdf8;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        footer {
            background: #1e293b;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    Перевірка веб-хостингу
</header>

<nav>
    <a href="#">Головна</a>
    <a href="#">Інформація</a>
    <a href="#">Контакти</a>
</nav>

<div class="container">
    <div class="card">
        <h2>Тестовий файл</h2>
        <p>Цей файл використовується для перевірки роботи веб-хостингу. Якщо ви бачите цю сторінку — сервер працює коректно.</p>
    </div>
</div>

<footer>
    © 2026 Перевірка хостингу
</footer>

</body>
</html>
